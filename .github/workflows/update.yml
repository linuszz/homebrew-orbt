name: Update Formula

on:
  repository_dispatch:
    types: [new-release]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.2.0)'
        required: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          V="${{ github.event.client_payload.version || github.event.inputs.version }}"
          echo "version=${V#v}" >> "$GITHUB_OUTPUT"
          echo "tag=$V" >> "$GITHUB_OUTPUT"

      - name: Compute sha256 sums
        id: sha
        run: |
          base="https://github.com/linuszz/orbit/releases/download/${{ steps.ver.outputs.tag }}"
          for target in macos-aarch64 macos-x86_64 linux-x86_64; do
            sha=$(curl -sL "${base}/orbit-${target}.tar.gz" | sha256sum | cut -d' ' -f1)
            echo "${target//-/_}_sha=${sha}" >> "$GITHUB_OUTPUT"
          done

      - name: Update Formula
        env:
          VER: ${{ steps.ver.outputs.version }}
          SHA_MACOS_AARCH64: ${{ steps.sha.outputs.macos_aarch64_sha }}
          SHA_MACOS_X86_64: ${{ steps.sha.outputs.macos_x86_64_sha }}
          SHA_LINUX_X86_64: ${{ steps.sha.outputs.linux_x86_64_sha }}
        run: |
          sed -i "s/version \".*\"/version \"${VER}\"/" Formula/orbit.rb
          # Replace sha256 values in order: aarch64, x86_64 macOS, linux x86_64
          shas=("$SHA_MACOS_AARCH64" "$SHA_MACOS_X86_64" "$SHA_LINUX_X86_64")
          i=0
          while IFS= read -r line; do
            if [[ "$line" =~ ^[[:space:]]*sha256 ]]; then
              echo "      sha256 \"${shas[$i]}\""
              i=$((i+1))
            else
              echo "$line"
            fi
          done < Formula/orbit.rb > Formula/orbit.rb.tmp
          mv Formula/orbit.rb.tmp Formula/orbit.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/orbit.rb
          git commit -m "chore: update orbit to v${{ steps.ver.outputs.version }}"
          git push
